<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>To Do Tracker</title>
    <link rel="stylesheet" href="../css/to-do.css">
</head>
<body>
    <div class="app-shell" aria-hidden="true" hidden>
        <div id="cursor"></div>

        <header class="hero">
            <div class="hero-copy">
                <p class="eyebrow">Task Master</p>
                <h1>To Do Tracker</h1>
                <p class="subtitle">Organize your day with stylish planning, smart filters, and instant progress.</p>
            </div>
            <div class="hero-figure" aria-hidden="true"></div>
        </header>
        
        <main class="tracker">
            <section class="input-card">
                <div class="input-row">
                    <input id="taskInput" type="text" placeholder="Add a new task..." aria-label="New task">
                    <button id="addButton" class="btn-primary">Add Task</button>
                </div>
                <div class="status-bar">
                    <span id="countLabel">0 tasks</span>
                    
                    <div class="toggle-group" role="group" aria-label="Task filters">
                        <button class="filter-btn active" data-filter="all">All</button>
                        <button class="filter-btn" data-filter="active">Active</button>
                        <button class="filter-btn" data-filter="completed">Completed</button>
                    </div>
                </div>
            </section>
            <section class="todo-card">
                <ul id="todoList" class="todo-list" aria-live="polite"></ul>
                <div class="todo-actions">
                    <button id="clearCompleted" class="btn-outline">Clear Completed</button>
                    <button id="clearAll" class="btn-outline">Clear All</button>
                </div>
            </section>
        </main>
    </div>
    <script type="module" src="js/to-do.js" defer></script>
</body>
</html>
